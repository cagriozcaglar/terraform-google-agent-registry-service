apiVersion: blueprints.cloud.google.com/v1alpha1
kind: TerraformBlueprint
metadata:
  name: terraform-google-dialogflow-cx-agent
  source:
    type: git
    git:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-dialogflow-cx-agent.git
      dir: /
  version: 1.0.0
  actuationTool:
    type: Terraform
    version: ">= 1.0"
  title: Dialogflow CX Agent
  description:
    tagline: A Terraform module for creating and configuring a Google Cloud Dialogflow CX Agent.
    detailed: This module simplifies the deployment of a Dialogflow CX agent, allowing you to define its core properties such as name, language, and time zone declaratively.
  icon: assets/icon.svg
  deploymentDuration:
    configuration: 1m
    deployment: 3m
  costEstimate:
    description: Refer to the official pricing page for details.
    url: https://cloud.google.com/dialogflow/cx/pricing
spec:
  requirements:
    roles:
      - level: Project
        role: roles/dialogflow.agentAdmin
    services:
      - dialogflow.googleapis.com
  customization:
    variables:
      - name: display_name
        description: The human-readable name of the agent, unique within the location.
        type: String
        required: true
        defaultValue: tf-gcp-dialogflow-cx-agent
      - name: location
        description: The location of the agent. Must be a valid GCP region.
        type: String
        required: true
        defaultValue: us-central1
      - name: project_id
        description: The project ID to host the Dialogflow CX agent. If not provided, the provider project is used.
        type: String
        required: false
        defaultValue: null
      - name: default_language_code
        description: "The default language of the agent as a language tag. See [Language Support](https://cloud.google.com/dialogflow/cx/docs/reference/language) for a list of the currently supported language codes."
        type: String
        required: true
        defaultValue: en
      - name: time_zone
        description: "The time zone of the agent from the [time zone database](https://www.iana.org/time-zones), e.g., America/New_York, Europe/Paris."
        type: String
        required: true
        defaultValue: America/New_York
      - name: description
        description: The description of the agent.
        type: String
        required: false
        defaultValue: null
      - name: avatar_uri
        description: The URI of the agent's avatar. Avatars are not resolved when walking declarative definitions.
        type: String
        required: false
        defaultValue: null
      - name: security_settings
        description: "Name of the SecuritySettings reference for the agent. Format: `projects/<Project ID>/locations/<Location ID>/securitySettings/<Security Settings ID>`."
        type: String
        required: false
        defaultValue: null
      - name: supported_language_codes
        description: The list of all languages supported by this agent (except for the default language).
        type: List<String>
        required: false
        defaultValue: null
    variableGroups:
      - name: Core Agent Settings
        description: Essential configuration for the Dialogflow CX Agent.
        variables:
          - display_name
          - location
          - project_id
          - default_language_code
          - time_zone
      - name: Optional Agent Details
        description: Additional settings to customize the agent's appearance and behavior.
        expanded: false
        variables:
          - description
          - avatar_uri
          - security_settings
          - supported_language_codes
    outputs:
      - name: agent_id
        description: The unique identifier of the Dialogflow CX agent.
      - name: agent_name
        description: "The resource name of the Dialogflow CX agent, in the format `projects/<Project ID>/locations/<Location ID>/agents/<Agent ID>`."
      - name: start_flow
        description: "The name of the start flow in the format `projects/<Project ID>/locations/<Location ID>/agents/<Agent ID>/flows/<Flow ID>`."
